<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Digital Leap Marketing Solutions">
  <!-- Pink D square -->
  <rect x="0" y="8" width="54" height="54" rx="4" fill="#EE2770"/>
  <text x="10" y="52" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="white">D</text>

  <!-- Running figure icon (top of the 'l') -->
