    <circle cx="72" cy="16" r="13" fill="#EE2770"/>
    <path d="M55 35 Q50 52 45 58 Q40 64 38 70" stroke="#EE2770" stroke-width="18" stroke-linecap="round" fill="none"/>
    <path d="M55 42 Q38 30 18 26" stroke="#EE2770" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M55 42 Q72 48 88 44" stroke="#EE2770" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M42 65 Q28 72 16 82" stroke="#EE2770" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M42 65 Q58 76 72 86" stroke="#EE2770" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>

