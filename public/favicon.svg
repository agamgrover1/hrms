<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Digital Leap running figure — brand pink #EE2770 -->
  <!-- Head -->
  <circle cx="70" cy="14" r="12" fill="#EE2770"/>
  <!-- Body: torso leaning forward-left -->
  <path d="M62 28 C58 38 52 46 48 55 C44 64 42 70 40 74"
        stroke="#EE2770" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Left arm: sweeping up-left (background arm) -->
  <path d="M58 36 C46 30 30 25 14 24"
        stroke="#EE2770" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Right arm: sweeping right (foreground arm) -->
  <path d="M60 38 C70 42 82 40 92 36"
        stroke="#EE2770" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Left leg: kicking back-upper-left -->
  <path d="M44 62 C34 68 20 75 10 84"
        stroke="#EE2770" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Right leg: sweeping down-right -->
  <path d="M46 68 C56 76 68 84 78 90"
        stroke="#EE2770" stroke-width="13" stroke-linecap="round" fill="none"/>
</svg>
