<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Leap HRMS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f9; color: #192250;
    }
    .header {
      background: linear-gradient(135deg, #192250 0%, #111737 100%);
      padding: 13px 15px; display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 9px; }
    .header-icon { width: 28px; height: 28px; border-radius: 8px; object-fit: contain; }
    .header-title { color: #fff; font-size: 13px; font-weight: 700; }
    .header-sub { color: rgba(255,255,255,0.4); font-size: 10px; margin-top: 1px; }
    .logout-btn { background: rgba(255,255,255,0.1); border: none; cursor: pointer; color: rgba(255,255,255,0.5); font-size: 11px; padding: 4px 10px; border-radius: 6px; }
    .logout-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

    .content { padding: 14px; }

    /* Login */
    .login-wrap { padding: 18px 15px 15px; }
    .login-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .login-sub { font-size: 11px; color: #9ca3af; margin-bottom: 16px; }
    .field { margin-bottom: 11px; }
    .field label { display: block; font-size: 10px; font-weight: 700; color: #192250; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input { width: 100%; padding: 9px 11px; border: 1.5px solid #e2e4ed; border-radius: 9px; font-size: 13px; outline: none; background: #fff; color: #192250; transition: border-color 0.15s; }
    .field input:focus { border-color: #192250; box-shadow: 0 0 0 3px rgba(25,34,80,0.08); }

    /* Buttons */
    .btn { width: 100%; padding: 11px; border: none; cursor: pointer; border-radius: 10px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 7px; transition: opacity 0.15s, transform 0.1s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary   { background: linear-gradient(135deg, #EE2770, #d11f62); color: #fff; box-shadow: 0 4px 12px rgba(238,39,112,0.3); }
    .btn-secondary { background: #192250; color: #fff; box-shadow: 0 4px 12px rgba(25,34,80,0.2); }
    .btn-break     { background: #f3f4f6; color: #374151; border: 1.5px solid #e5e7eb; }
    .btn-break:hover { background: #e5e7eb; }

    /* Employee card */
    .emp-card { background: #fff; border-radius: 12px; padding: 12px 14px; border: 1px solid #e9eaf0; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .emp-name { font-size: 14px; font-weight: 700; color: #192250; }
    .emp-code { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
    .badge-wfh    { background: rgba(25,34,80,0.08); color: #192250; }
    .badge-office { background: rgba(22,163,74,0.1); color: #15803d; }
    .badge-ot     { background: rgba(238,39,112,0.1); color: #EE2770; }

    /* Timer */
    .timer-block { text-align: center; padding: 12px 0 8px; }
    .timer-label { font-size: 10px; color: #9ca3af; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 4px; }
    .timer-value { font-size: 38px; font-weight: 800; color: #192250; letter-spacing: -2px; font-variant-numeric: tabular-nums; line-height: 1; }
    .timer-since { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    .timer-ot    { color: #EE2770 !important; }

    /* Total bar */
    .total-bar { background: #fff; border-radius: 10px; padding: 10px 12px; border: 1px solid #e9eaf0; margin: 10px 0; }
    .total-row { display: flex; align-items: center; justify-content: space-between; }
    .total-lbl { font-size: 11px; color: #9ca3af; }
    .total-val { font-size: 14px; font-weight: 800; color: #192250; }
    .ext-tag   { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: rgba(238,39,112,0.1); color: #EE2770; margin-left: 6px; }
    /* Activity bar */
    .activity-wrap { margin-top: 8px; }
    .activity-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .activity-lbl { font-size: 10px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .activity-pct { font-size: 11px; font-weight: 800; }
    .activity-bar-bg { height: 6px; border-radius: 3px; background: #f0f1f5; overflow: hidden; }
    .activity-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

    /* Session list */
    .sessions-wrap { margin-bottom: 12px; }
    .sessions-title { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .session-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 11px; background: #fff; border-radius: 9px; border: 1px solid #e9eaf0; margin-bottom: 5px; }
    .session-times { font-size: 12px; font-weight: 600; color: #192250; }
    .session-dur   { font-size: 11px; color: #9ca3af; }
    .session-src   { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
    .session-src.ext { background: rgba(238,39,112,0.1); color: #EE2770; }
    .session-src.bio { background: rgba(22,163,74,0.1); color: #15803d; }
    .session-active { border-color: #EE2770; background: rgba(238,39,112,0.03); }

    /* Info rows */
    .info-row { display: flex; align-items: center; gap: 8px; padding: 9px 11px; border-radius: 9px; margin-bottom: 10px; font-size: 11px; font-weight: 500; }
    .info-wfh  { background: rgba(238,39,112,0.06); color: #d11f62; border: 1px solid rgba(238,39,112,0.15); }
    .info-bio  { background: rgba(22,163,74,0.06); color: #15803d;  border: 1px solid rgba(22,163,74,0.15); }
    .info-ot   { background: rgba(238,39,112,0.06); color: #EE2770;  border: 1px solid rgba(238,39,112,0.15); }
    .info-shift{ background: rgba(25,34,80,0.04);  color: #192250;  border: 1px solid rgba(25,34,80,0.08); }

    .divider { height: 1px; background: #f0f1f5; margin: 10px 0; }
    .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 9px; padding: 9px 11px; font-size: 11px; color: #dc2626; margin-bottom: 10px; }
    .loader-wrap { display: flex; align-items: center; justify-content: center; padding: 30px; }
    .spinner { width: 24px; height: 24px; border: 3px solid rgba(25,34,80,0.1); border-top-color: #192250; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <img src="icons/icon48.png" class="header-icon" alt="DL"/>
      <div>
        <div class="header-title">Digital Leap HRMS</div>
        <div class="header-sub">Attendance Tracker</div>
      </div>
    </div>
    <button class="logout-btn hidden" id="logoutBtn">Sign Out</button>
  </div>

  <!-- Loading -->
  <div id="loadingView" class="loader-wrap">
    <div class="spinner"></div>
  </div>

  <!-- Login -->
  <div id="loginView" class="login-wrap hidden">
    <div class="login-title">Sign in</div>
    <div class="login-sub">Use your Digital Leap credentials</div>
    <div id="loginError" class="error-box hidden"></div>
    <div class="field"><label>Email</label><input type="email" id="emailInput" placeholder="you@digitalleapmarketing.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="passwordInput" placeholder="••••••••"/></div>
    <button class="btn btn-primary" id="loginBtn">Sign In →</button>
  </div>

  <!-- Main -->
  <div id="mainView" class="content hidden">
    <div class="emp-card">
      <div><div class="emp-name" id="empName">—</div><div class="emp-code" id="empCode">—</div></div>
      <span class="badge" id="dayBadge">—</span>
    </div>
    <div id="mainError" class="error-box hidden"></div>

    <!-- Notices -->
    <div id="wfhNotice" class="info-row info-wfh hidden">🏠 WFH today — clock-in required</div>
    <div id="bioNotice" class="info-row info-bio hidden">✓ Biometric attendance recorded</div>
    <div id="shiftInfo" class="info-row info-shift hidden" id="shiftInfo"></div>
    <div id="otNotice"  class="info-row info-ot  hidden">🔥 Overtime — great work!</div>

    <!-- Total hours + activity bar -->
    <div id="totalBar" class="total-bar hidden">
      <div class="total-row">
        <span class="total-lbl">Total today</span>
        <span>
          <span class="total-val" id="totalVal">0:00</span>
          <span class="ext-tag hidden" id="extTag"></span>
        </span>
      </div>
      <!-- Activity bar — only shown when clocked in via extension -->
      <div id="activityWrap" class="activity-wrap hidden">
        <div class="activity-label-row">
          <span class="activity-lbl">Activity</span>
          <span class="activity-pct" id="activityPct">—</span>
        </div>
        <div class="activity-bar-bg">
          <div class="activity-bar-fill" id="activityBarFill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Session list -->
    <div id="sessionsWrap" class="sessions-wrap hidden">
      <div class="sessions-title">Work sessions</div>
      <div id="sessionsList"></div>
    </div>

    <!-- Not clocked in -->
    <div id="notClockedView" class="hidden">
      <button class="btn btn-primary" id="clockInBtn">⏱ Start Work</button>
    </div>

    <!-- Clocked IN -->
    <div id="clockedInView" class="hidden">
      <div class="timer-block">
        <div class="timer-label">Session time</div>
        <div class="timer-value" id="timerDisplay">0:00:00</div>
        <div class="timer-since">Started at <span id="sessionStartTime">—</span></div>
      </div>
      <button class="btn btn-break" id="clockOutBtn" style="margin-bottom:8px">⏸ Clock Out / Take Break</button>
    </div>

    <!-- On break (sessions exist but none active) -->
    <div id="onBreakView" class="hidden">
      <div style="text-align:center;padding:10px 0 8px">
        <div class="timer-label" style="color:#d97706">On Break</div>
        <div style="font-size:13px;color:#374151;margin-top:4px">Clock in when you're back</div>
      </div>
      <button class="btn btn-primary" id="resumeBtn">▶ Resume Work / Clock In</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
