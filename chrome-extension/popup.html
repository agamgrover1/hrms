<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Leap HRMS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f9;
      color: #192250;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #192250 0%, #111737 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #EE2770; flex-shrink: 0;
    }
    .header-title { color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 0.3px; }
    .header-sub { color: rgba(255,255,255,0.45); font-size: 11px; margin-top: 1px; }
    .logout-btn {
      background: rgba(255,255,255,0.1); border: none; cursor: pointer;
      color: rgba(255,255,255,0.5); font-size: 11px; padding: 4px 10px;
      border-radius: 6px; transition: all 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }

    /* ── Content ── */
    .content { padding: 16px; }

    /* ── Login form ── */
    .login-wrap { padding: 20px 16px 16px; }
    .login-title { font-size: 16px; font-weight: 700; color: #192250; margin-bottom: 4px; }
    .login-sub { font-size: 12px; color: #9ca3af; margin-bottom: 18px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #192250; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input {
      width: 100%; padding: 10px 12px; border: 1.5px solid #e2e4ed;
      border-radius: 10px; font-size: 13px; outline: none;
      background: #fff; transition: border-color 0.15s, box-shadow 0.15s;
      color: #192250;
    }
    .field input:focus { border-color: #192250; box-shadow: 0 0 0 3px rgba(25,34,80,0.08); }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 11px; border: none; cursor: pointer;
      border-radius: 10px; font-size: 13px; font-weight: 700;
      letter-spacing: 0.3px; transition: opacity 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, #EE2770 0%, #d11f62 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(238,39,112,0.3);
    }
    .btn-secondary {
      background: #192250; color: #fff;
      box-shadow: 0 4px 14px rgba(25,34,80,0.2);
    }
    .btn-outline {
      background: #fff; color: #192250;
      border: 1.5px solid #e2e4ed;
    }
    .btn-outline:hover { border-color: #192250; }

    /* ── Status card ── */
    .status-card {
      background: #fff; border-radius: 14px; padding: 16px;
      border: 1px solid #e9eaf0; margin-bottom: 14px;
    }
    .status-row { display: flex; align-items: center; justify-content: space-between; }
    .emp-name { font-size: 15px; font-weight: 700; color: #192250; }
    .emp-code { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .badge {
      font-size: 10px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-wfh   { background: rgba(25,34,80,0.08); color: #192250; }
    .badge-office{ background: rgba(22,163,74,0.1); color: #15803d; }
    .badge-ok    { background: rgba(22,163,74,0.1); color: #15803d; }
    .badge-warn  { background: rgba(238,39,112,0.1); color: #EE2770; }

    /* ── Timer ── */
    .timer-block { text-align: center; padding: 14px 0 10px; }
    .timer-label { font-size: 11px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .timer-value { font-size: 36px; font-weight: 800; color: #192250; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
    .timer-since { font-size: 11px; color: #9ca3af; margin-top: 4px; }

    /* ── Info row ── */
    .info-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 10px; margin-bottom: 10px;
      font-size: 12px; font-weight: 500;
    }
    .info-row.wfh-req  { background: rgba(238,39,112,0.06); color: #d11f62; border: 1px solid rgba(238,39,112,0.15); }
    .info-row.bio      { background: rgba(22,163,74,0.06); color: #15803d; border: 1px solid rgba(22,163,74,0.15); }
    .info-row.shift    { background: rgba(25,34,80,0.04); color: #192250; border: 1px solid rgba(25,34,80,0.08); }

    /* ── Summary row ── */
    .summary-row {
      display: flex; gap: 10px; margin-bottom: 14px;
    }
    .summary-item {
      flex: 1; background: #fff; border: 1px solid #e9eaf0;
      border-radius: 12px; padding: 12px; text-align: center;
    }
    .summary-val { font-size: 18px; font-weight: 800; color: #192250; }
    .summary-lbl { font-size: 10px; color: #9ca3af; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }

    /* ── Error ── */
    .error-box {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 10px; padding: 10px 12px;
      font-size: 12px; color: #dc2626; margin-bottom: 12px;
      display: flex; align-items: flex-start; gap: 7px;
    }
    .divider { height: 1px; background: #f0f1f5; margin: 14px 0; }

    /* ── Loading ── */
    .loader-wrap { display: flex; align-items: center; justify-content: center; padding: 32px; }
    .spinner {
      width: 26px; height: 26px; border: 3px solid rgba(25,34,80,0.1);
      border-top-color: #192250; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <div class="header-dot"></div>
      <div>
        <div class="header-title">Digital Leap HRMS</div>
        <div class="header-sub">Employee Portal</div>
      </div>
    </div>
    <button class="logout-btn hidden" id="logoutBtn">Sign Out</button>
  </div>

  <!-- Loading -->
  <div id="loadingView" class="loader-wrap">
    <div class="spinner"></div>
  </div>

  <!-- Login -->
  <div id="loginView" class="login-wrap hidden">
    <div class="login-title">Sign in</div>
    <div class="login-sub">Use your Digital Leap credentials</div>
    <div id="loginError" class="error-box hidden">
      <span>⚠</span><span id="loginErrorMsg"></span>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@digitalleapmarketing.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" id="loginBtn">Sign In →</button>
  </div>

  <!-- Main dashboard -->
  <div id="mainView" class="content hidden">

    <!-- Employee card -->
    <div class="status-card">
      <div class="status-row">
        <div>
          <div class="emp-name" id="empName">—</div>
          <div class="emp-code" id="empCode">—</div>
        </div>
        <span class="badge" id="dayBadge">—</span>
      </div>
    </div>

    <!-- Error -->
    <div id="mainError" class="error-box hidden">
      <span>⚠</span><span id="mainErrorMsg"></span>
    </div>

    <!-- WFH mandatory notice -->
    <div id="wfhNotice" class="info-row wfh-req hidden">
      🏠 WFH today — clock-in required
    </div>

    <!-- Biometric recorded notice -->
    <div id="bioNotice" class="info-row bio hidden">
      ✓ Biometric attendance recorded — all good!
    </div>

    <!-- Shift info -->
    <div id="shiftInfo" class="info-row shift hidden">
      <span id="shiftText">—</span>
    </div>

    <!-- NOT clocked in yet -->
    <div id="notClockedView" class="hidden">
      <button class="btn btn-primary" id="clockInBtn">
        <span>⏱</span> Clock In
      </button>
    </div>

    <!-- Clocked IN — timer -->
    <div id="clockedInView" class="hidden">
      <div class="timer-block">
        <div class="timer-label">Working hours today</div>
        <div class="timer-value" id="timerDisplay">0:00:00</div>
        <div class="timer-since">Clocked in at <span id="clockInTime">—</span></div>
      </div>
      <button class="btn btn-secondary" id="clockOutBtn">
        ⏹ Clock Out
      </button>
    </div>

    <!-- Clocked OUT — summary -->
    <div id="clockedOutView" class="hidden">
      <div class="summary-row">
        <div class="summary-item">
          <div class="summary-val" id="summaryIn">—</div>
          <div class="summary-lbl">Clock In</div>
        </div>
        <div class="summary-item">
          <div class="summary-val" id="summaryOut">—</div>
          <div class="summary-lbl">Clock Out</div>
        </div>
        <div class="summary-item">
          <div class="summary-val" id="summaryHours">—</div>
          <div class="summary-lbl">Hours</div>
        </div>
      </div>
      <div class="info-row bio">✓ Attendance recorded successfully</div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
